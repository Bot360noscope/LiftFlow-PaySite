services:
  - type: web
    name: liftflow-payments
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm install && npm run build && npm run db:push
    startCommand: NODE_ENV=production npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
